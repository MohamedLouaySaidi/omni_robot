obstacle_avoider_node:
  ros__parameters:
    # Stop / slow-down distances (metres). Halved from earlier test values.
    # Do not set safe_distance_m below ~0.03 (HC-SR04 blind zone ~2 cm).
    safe_distance_m: 0.06
    warning_distance_m: 0.17
    max_forward_mps: 0.5
    max_reverse_mps: 0.35
    max_angular_rads: 1.0
    tilt_slow_deg: 20.0
    tilt_stop_deg: 35.0
    sensor_timeout_s: 1.0
    log_debug: true
