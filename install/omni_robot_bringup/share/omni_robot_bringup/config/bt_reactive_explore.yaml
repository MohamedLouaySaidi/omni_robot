bt_reactive_explorer_node:
  ros__parameters:
    cmd_vel_topic: "cmd_vel_safe"
    imu_topic: "imu/data"
    front_topic: "ultrasonic/front"
    back_topic: "ultrasonic/back"
    left_topic: "ultrasonic/left"
    right_topic: "ultrasonic/right"
    tick_rate_hz: 20.0
    sensor_timeout_s: 0.4
    imu_timeout_s: 0.8
    filter_window: 1
    front_block_m: 0.030
    front_blocked_persist_s: 1.5
    back_block_m: 0.030
    wall_detect_m: 0.015
    wall_follow_distance_m: 0.02
    wall_follow_kp: 1.2
    wall_search_turn_rads: 0.4
    wall_side: "auto"
    forward_speed_mps: 0.02
    slow_down_start_m: 0.10
    slow_forward_speed_mps: 0.010
    reverse_speed_mps: 0.06
    turn_speed_rads: 0.3
    backup_time_s: 2.8
    turn_time_s: 3.2
    forward_test_time_s: 2.4
    spin_time_s: 6.4
    wait_time_s: 0.8
    prefer_turn_dir: "alternate"
    tilt_stop_deg: 35.0
    impact_accel_mps2: 12.5
    impact_cooldown_s: 1.0
    enable_groot: false
    groot_pub_port: 1666
    groot_server_port: 1667
    log_debug: true
