frontier_explorer_node:
  ros__parameters:
    goal_frame: "map"
    robot_base_frame: "base_link"
    map_topic: "/map"
    update_period_s: 1.0
    map_stale_s: 5.0
    min_frontier_size: 1
    min_goal_distance_m: 0.1
    max_goal_distance_m: 5.0
    goal_cooldown_s: 2.0
    goal_reached_tolerance_m: 0.3
    max_goal_time_s: 60.0
    use_random_fallback: true
    allow_unknown_fallback: true
    random_goal_radius_m: 2.5
    log_debug: true
